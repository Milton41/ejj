<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Escuela Técnica</title>
  <style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #004080;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #0066cc;
      padding: 10px;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    /* Carrousel */
    .carousel {
      position: relative;
      max-width: 100%;
      margin: 20px auto;
      overflow: hidden;
    }

    .carousel img {
      width: 100%;
      display: none;
    }

    .carousel img.active {
      display: block;
    }

    /* Formularios */
    .form-container {
      max-width: 400px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .form-container h2 {
      margin-bottom: 15px;
      text-align: center;
    }

    .form-container input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .form-container button {
      width: 100%;
      padding: 10px;
      background: #004080;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .form-container button:hover {
      background: #0066cc;
    }

    /* Responsive con media queries */
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        align-items: center;
      }
      .form-container {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Escuela Técnica - Frontend</h1>
  </header>

  <nav>
    <a href="#">Buscar</a>
    <a href="#">Materias</a>
    <a href="#">Preceptores</a>
    <a href="#">Técnicaturas</a>
    <a href="#">Iniciar sesión</a>
    <a href="#">Registrarse</a>
  </nav>

  <!-- Carrousel -->
  <div class="carousel">
    <img src="https://via.placeholder.com/800x300?text=Bienvenidos" class="active">
    <img src="https://via.placeholder.com/800x300?text=Materias+Disponibles">
    <img src="https://via.placeholder.com/800x300?text=Registrate+Hoy">
  </div>

  <!-- Formulario de Login -->
  <div class="form-container">
    <h2>Iniciar Sesión</h2>
    <input type="text" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">
    <button>Ingresar</button>
  </div>

  <!-- Formulario de Registro -->
  <div class="form-container">
    <h2>Registrarse</h2>
    <input type="text" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">
    <input type="password" placeholder="Confirmar contraseña">
    <input type="text" placeholder="DNI">
    <input type="email" placeholder="Correo electrónico">
    <button>Crear cuenta</button>
  </div>

  <script>
    // Carrousel simple en JS
    let index = 0;
    const slides = document.querySelectorAll('.carousel img');

    function showSlide(i) {
      slides.forEach((slide, idx) => {
        slide.classList.remove('active');
        if (idx === i) slide.classList.add('active');
      });
    }

    function nextSlide() {
      index = (index + 1) % slides.length;
      showSlide(index);
    }

    setInterval(nextSlide, 3000); // Cambia cada 3 segundos
  </script>

</body>
</html>
